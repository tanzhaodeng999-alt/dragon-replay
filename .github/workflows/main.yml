name: dragon-replay

on:
  workflow_dispatch:  # 手动触发运行

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4  # 这里升级到了 v4

      - name: Set up Python
        uses: actions/setup-python@v5  # 这里升级到了 v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install requests pandas

      - name: Run script
        run: python main.py
